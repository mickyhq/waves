<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ocean Scene</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif}
    canvas{display:block}

    #panel{
      position:fixed;top:30px;right:30px;z-index:10;
      min-width:260px;padding:24px 22px 18px;
      background:rgba(20,30,50,0.55);
      backdrop-filter:blur(18px) saturate(140%);
      -webkit-backdrop-filter:blur(18px) saturate(140%);
      border:1px solid rgba(255,255,255,0.18);border-radius:18px;
      box-shadow:0 8px 36px rgba(0,0,0,0.35);color:#e8eef5;
    }
    #panel h3{margin:0 0 16px;font-size:1.1rem;font-weight:600;letter-spacing:.5px;color:#c8daf0;text-transform:uppercase}
    .slider-group{margin-bottom:14px}
    .slider-group label{display:flex;justify-content:space-between;align-items:baseline;font-size:.82rem;font-weight:500;color:#bcc8da;margin-bottom:4px}
    .slider-group label span.value{font-weight:600;color:#e0ecff;min-width:42px;text-align:right}
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#7bb8e0;border:2px solid rgba(255,255,255,0.6);box-shadow:0 2px 10px rgba(0,160,255,0.4);cursor:pointer}
    input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#7bb8e0;border:2px solid rgba(255,255,255,0.6);cursor:pointer}
    #panel .divider{height:1px;background:rgba(255,255,255,0.1);margin:12px 0 14px}
    #panel .hint{font-size:.7rem;color:rgba(200,215,235,0.55);text-align:center;margin-top:4px}
  </style>
</head>
<body>

  <div id="panel">
    <h3>🌊 Ocean Controls</h3>
    <div class="slider-group"><label>Wave Height <span class="value" id="valHeight">1.0</span></label><input type="range" id="sliderHeight" min="0" max="3" step="0.05" value="1.0"></div>
    <div class="slider-group"><label>Wave Speed <span class="value" id="valSpeed">1.0</span></label><input type="range" id="sliderSpeed" min="0.1" max="3" step="0.05" value="1.0"></div>
    <div class="slider-group"><label>Wave Frequency <span class="value" id="valFreq">1.0</span></label><input type="range" id="sliderFreq" min="0.2" max="3" step="0.05" value="1.0"></div>
    <div class="slider-group"><label>Break Distance <span class="value" id="valBreak">7.0</span></label><input type="range" id="sliderBreak" min="2" max="18" step="0.5" value="7.0"></div>
    <div class="divider"></div>
    <div class="hint">🖱 Drag to orbit • Scroll to zoom • R to reset</div>
  </div>

  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Water } from 'three/addons/objects/Water.js';
    import { Sky } from 'three/addons/objects/Sky.js';

    // ===================================================================
    // GLOBAL CONFIG
    // ===================================================================
    const CONFIG = {
    waveHeight: 1.0,
    waveSpeed: 1.0,
    waveFrequency: 1.0,
    breakDistance: 7.0,
    };

    // ===================================================================
    // RENDERER
    // ===================================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    document.body.appendChild(renderer.domElement);

    // ===================================================================
    // SCENE & CAMERA
    // ===================================================================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 400);
    camera.position.set(0, 15, 35);
    camera.lookAt(0, 0, -30);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, -30);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 5;
    controls.maxDistance = 150;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.update();

    // ===================================================================
    // SKY
    // ===================================================================
    const sky = new Sky();
    sky.scale.setScalar(500);
    scene.add(sky);

    const sunPos = new THREE.Vector3(100, 80, -100);
    sky.material.uniforms['turbidity'].value = 4;
    sky.material.uniforms['rayleigh'].value = 2.5;
    sky.material.uniforms['mieCoefficient'].value = 0.003;
    sky.material.uniforms['mieDirectionalG'].value = 0.7;
    sky.material.uniforms['sunPosition'].value.copy(sunPos);

    // ===================================================================
    // LIGHTING
    // ===================================================================
    scene.add(new THREE.AmbientLight('#aaccff', 0.5));

    const sunLight = new THREE.DirectionalLight('#fffbe6', 4.0);
    sunLight.position.copy(sunPos);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 400;
    sunLight.shadow.camera.left = -120;
    sunLight.shadow.camera.right = 120;
    sunLight.shadow.camera.top = 120;
    sunLight.shadow.camera.bottom = -120;
    scene.add(sunLight);

    // ===================================================================
    // BEACH
    // ===================================================================
    {
      const w = 120, d = 40, maxH = 3.0;
      const sx = 100, sz = 50;
      const vx = sx+1, vz = sz+1;
      const pos = new Float32Array(vx*vz*3);

      for (let iz=0; iz<vz; iz++) {
        for (let ix=0; ix<vx; ix++) {
          const i = (iz*vx+ix)*3;
          pos[i]   = (ix/sx-0.5)*w;
          pos[i+2] = (iz/sz)*d;
          pos[i+1] = maxH * (iz/sz)**0.55;
        }
      }

      const idx = [];
      for (let iz=0; iz<sz; iz++) {
        for (let ix=0; ix<sx; ix++) {
          const a=iz*vx+ix, b=a+1, c=a+vx, d=c+1;
          idx.push(a,b,d,a,d,c);
        }
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
      geo.setIndex(idx);
      geo.computeVertexNormals();

      const mat = new THREE.MeshStandardMaterial({
        color: '#d4b896',
        roughness: 0.7,
        metalness: 0.02,
      });

      const beach = new THREE.Mesh(geo, mat);
      beach.receiveShadow = true;
      beach.castShadow = true;
      scene.add(beach);
    }

    // ===================================================================
    // WATER — Three.js Water addon with Gerstner wave displacement
    // ===================================================================
    const WATER_WIDTH = 300;
    const WATER_DEPTH = 120;
    const SHORELINE_Z = 0;
    const SHOAL_ZONE  = 18;    // distance from shore where shoaling begins
    const SHOAL_BOOST = 2.2;   // amplitude multiplier at peak shoaling

    const WSEGX = 200;
    const WSEGZ = 80;
    const waterGeo = new THREE.PlaneGeometry(WATER_WIDTH, WATER_DEPTH, WSEGX, WSEGZ);
    waterGeo.rotateX(-Math.PI/2);

    const basePositions = new Float32Array(waterGeo.attributes.position.array);
    const vertCount = waterGeo.attributes.position.count;

    const waterNormals = new THREE.TextureLoader().load(
      'https://threejs.org/examples/textures/waternormals.jpg',
      (tex) => { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; }
    );

    const water = new Water(waterGeo, {
      textureWidth: 1024,
      textureHeight: 1024,
      waterNormals: waterNormals,
      sunDirection: sunPos.clone().normalize(),
      sunColor: 0xffffff,
      waterColor: 0x0a5a90,
      distortionScale: 3.0,
    });

    water.position.set(0, 0, -WATER_DEPTH/2);
    scene.add(water);

    // ===================================================================
    // FOAM LAYER — textured, animated alpha, rolls with crest
    // ===================================================================
    const foamGeo = new THREE.PlaneGeometry(WATER_WIDTH, WATER_DEPTH, WSEGX, WSEGZ);
    foamGeo.rotateX(-Math.PI/2);
    // procedural foam texture (tiny white dots)
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#fff';
    for (let i=0; i<1200; i++) {
      const x = Math.random()*size, y = Math.random()*size;
      const r = Math.random()*1.6 + 0.4;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    const foamTex = new THREE.CanvasTexture(canvas);
    foamTex.wrapS = foamTex.wrapT = THREE.RepeatWrapping;
    foamTex.repeat.set(10, 5);
    const foamMat = new THREE.MeshBasicMaterial({
      map: foamTex,
      transparent: true,
      vertexColors: true,
      opacity: 0.95,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const foam = new THREE.Mesh(foamGeo, foamMat);
    foam.position.copy(water.position);
    foam.position.y += 0.08;
    scene.add(foam);

    // per-vertex alpha for foam fade
    const foamColors = new Float32Array(foamGeo.attributes.position.count * 3);
    foamGeo.setAttribute('color', new THREE.BufferAttribute(foamColors, 3));

    // ===================================================================
    // SMOOTHSTEP HELPER
    // ===================================================================
    function smoothstep(a,b,x){const t=Math.max(0,Math.min(1,(x-a)/(b-a)));return t*t*(3-2*t);}

    function getBreaker(wx, wz, dist, time, breakDistance) {
      const sidePhase = wx * 0.052 - time * CONFIG.waveSpeed * 0.72
      const peel = 0.3 + 0.7 * smoothstep(-0.35, 0.7, Math.sin(sidePhase))
      const breakLine = breakDistance * (0.88 + Math.sin(wx * 0.035) * 0.13)
      const zoneWidth = Math.max(1.2, breakDistance * 0.32)
      const zone = Math.exp(-Math.pow((dist - breakLine) / zoneWidth, 2))
      const phase = wz * 0.68 + wx * 0.045 - time * CONFIG.waveSpeed * 0.92
      const wrapped = Math.atan2(Math.sin(phase), Math.cos(phase))
      const crest = Math.exp(-wrapped * wrapped * 5.5)
      const backwash = Math.exp(-Math.pow(wrapped - 0.7, 2) * 3.5)
      const active = dist > 0 && dist < SHOAL_ZONE ? 1 : 0

      return {
        crest: crest * active,
        foam: Math.min(1, (crest * 1.2 + backwash * 0.42) * zone * peel) * active,
        lift: crest * zone * (0.55 + peel * 0.7) * active,
        pitch: (crest * 0.9 - backwash * 0.28) * zone * peel * active,
        peel
      }
    }

    // ===================================================================
    // GERSTNER WAVE COMPONENTS
    // ===================================================================
    const WAVES = [
      {dx:0.25,dz:0.97,f:0.16,a:0.55,s:0.50,st:0.35},
      {dx:-0.15,dz:0.99,f:0.28,a:0.32,s:0.65,st:0.32},
      {dx:0.35,dz:0.94,f:0.22,a:0.26,s:0.60,st:0.30},
      {dx:-0.40,dz:0.92,f:0.45,a:0.18,s:0.85,st:0.28},
      {dx:0.10,dz:0.99,f:0.75,a:0.09,s:1.05,st:0.22},
      {dx:-0.20,dz:0.98,f:0.35,a:0.20,s:0.55,st:0.25},
      {dx:0.30,dz:0.95,f:1.00,a:0.05,s:1.20,st:0.18},
    ];

    // ===================================================================
    // ANIMATION
    // ===================================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      // Drive Water's internal normal-map animation
      water.material.uniforms['time'].value = time * CONFIG.waveSpeed * 0.8;

      // Gerstner vertex displacement with shoaling
      const posAttr = waterGeo.attributes.position;
      const arr = posAttr.array;

      for (let i = 0; i < vertCount; i++) {
        const i3 = i * 3;
        const wx = basePositions[i3];
        const bz = basePositions[i3 + 2];
        const wz = bz + water.position.z;

        const distToShore = SHORELINE_Z - wz; // positive in ocean

        // --- Shoaling curve ---
        // Deep water (dist > SHOAL_ZONE): base amplitude 1.0
        // Shallow water (BREAK_ZONE < dist < SHOAL_ZONE): amplitude grows (shoaling)
        // Break zone (0 < dist < BREAK_ZONE): amplitude peaks then crashes to 0 at shore
        let ampScale, steepExtra;
        const BREAK_ZONE = CONFIG.breakDistance;

        if (distToShore >= SHOAL_ZONE) {
          // Deep ocean — normal waves
          ampScale = 1.0;
          steepExtra = 0.0;
        } else if (distToShore >= BREAK_ZONE) {
          // Shoaling zone — waves grow taller as water gets shallow
          const t = 1.0 - (distToShore - BREAK_ZONE) / (SHOAL_ZONE - BREAK_ZONE);
          ampScale = 1.0 + (SHOAL_BOOST - 1.0) * t;
          steepExtra = t * 0.4;
        } else if (distToShore > 0) {
          // Break zone — wave peaks then crashes (breaking)
          const t = distToShore / BREAK_ZONE;
          ampScale = SHOAL_BOOST * Math.pow(t, 0.6);
          steepExtra = 0.5 + (1.0 - t) * 1.2;
        } else {
          ampScale = 0.0;
          steepExtra = 0.0;
        }

        ampScale *= CONFIG.waveHeight;

        let dx=0, dy=0, dz=0;
        for (const w of WAVES) {
          const freq = w.f * CONFIG.waveFrequency;
          const amp  = w.a * ampScale;
          const speed = w.s * CONFIG.waveSpeed;
          const steep = Math.min(w.st * (1.0 + steepExtra), 0.95);
          const dot = w.dx * wx + w.dz * wz;
          const ph = freq * dot - time * 0.9 * speed;
          const c = Math.cos(ph);
          const s = Math.sin(ph);
          dx -= steep * amp * w.dx * c;
          dy += amp * s;
          dz -= steep * amp * w.dz * c;
        }

        const breaker = getBreaker(wx, wz, distToShore, time, BREAK_ZONE)
        dy += breaker.lift * CONFIG.waveHeight
        dz += breaker.pitch * CONFIG.waveHeight

        arr[i3]     = wx + dx
        arr[i3 + 1] = dy
        arr[i3 + 2] = bz + dz
      }

      posAttr.needsUpdate = true;
      waterGeo.computeVertexNormals();

      // Foam + rolling crest
      const fPos = foamGeo.attributes.position;
      const fArr = fPos.array;
      const fCol = foamGeo.attributes.color.array;
      const BREAK = CONFIG.breakDistance;
      for (let i = 0; i < vertCount; i++) {
        const i3 = i * 3;
        const wx = basePositions[i3];
        const bz = basePositions[i3 + 2];
        const wz = bz + water.position.z;
        const dist = SHORELINE_Z - wz;
        const breaker = getBreaker(wx, wz, dist, time, BREAK)
        const shoreFoam = dist > 0 && dist < BREAK * 0.75
          ? (1 - dist / (BREAK * 0.75)) * 0.3
          : 0
        const alpha = Math.min(1, breaker.foam + shoreFoam)

        fArr[i3] = arr[i3]
        fArr[i3 + 1] = arr[i3 + 1] + 0.1 + alpha * 0.08
        fArr[i3 + 2] = arr[i3 + 2] + breaker.pitch * 0.18

        fCol[i3] = alpha
        fCol[i3 + 1] = alpha * 0.98
        fCol[i3 + 2] = alpha * 0.92
      }
      foamTex.offset.x = -time * CONFIG.waveSpeed * 0.025
      foamTex.offset.y = time * CONFIG.waveSpeed * 0.04
      fPos.needsUpdate = true
      foamGeo.attributes.color.needsUpdate = true

      controls.update();
      renderer.render(scene, camera);
    }

    // ===================================================================
    // RESIZE
    // ===================================================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===================================================================
    // UI
    // ===================================================================
    const sH = document.getElementById('sliderHeight');
    const sS = document.getElementById('sliderSpeed');
    const sF = document.getElementById('sliderFreq');
    const sB = document.getElementById('sliderBreak');
    const vH = document.getElementById('valHeight');
    const vS = document.getElementById('valSpeed');
    const vF = document.getElementById('valFreq');
    const vB = document.getElementById('valBreak');

    sH.oninput = () => { CONFIG.waveHeight = +sH.value; vH.textContent = CONFIG.waveHeight.toFixed(2); };
    sS.oninput = () => { CONFIG.waveSpeed = +sS.value; vS.textContent = CONFIG.waveSpeed.toFixed(2); };
    sF.oninput = () => { CONFIG.waveFrequency = +sF.value; vF.textContent = CONFIG.waveFrequency.toFixed(2); };
    sB.oninput = () => { CONFIG.breakDistance = +sB.value; vB.textContent = CONFIG.breakDistance.toFixed(1); };

    window.addEventListener('keydown', e => {
      if (e.key === 'r' || e.key === 'R') {
        [sH,sS,sF,sB].forEach(s => s.value = s===sB?'7':'1');
        CONFIG.waveHeight = CONFIG.waveSpeed = CONFIG.waveFrequency = 1.0;
        CONFIG.breakDistance = 7.0;
        vH.textContent = vS.textContent = vF.textContent = '1.00';
        vB.textContent = '7.0';
      }
    });

    animate();
  </script>
</body>
</html>
